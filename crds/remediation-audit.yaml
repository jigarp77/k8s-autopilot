apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: remediationaudits.autopilot.k8s.io
  labels:
    app.kubernetes.io/name: k8s-autopilot
    app.kubernetes.io/component: crd
spec:
  group: autopilot.k8s.io
  names:
    kind:     RemediationAudit
    plural:   remediationaudits
    singular: remediationaudit
    shortNames: [ra]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Resource
          type: string
          jsonPath: .spec.resourceId
        - name: Trigger
          type: string
          jsonPath: .spec.trigger
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Outcome
          type: string
          jsonPath: .spec.outcome
        - name: Severity
          type: string
          jsonPath: .spec.diagnosis.severity
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                resourceId:   {type: string}
                trigger:      {type: string}
                action:       {type: string}
                outcome:      {type: string}
                decidedBy:    {type: string}
                startedAt:    {type: string}
                completedAt:  {type: string}
                diagnosis:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                actionOutput:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
