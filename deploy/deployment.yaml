---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-autopilot
  namespace: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - nodes
      - nodes/status
      - events
      - namespaces
      - resourcequotas
      - replicationcontrollers
    verbs: [get, list, watch]

  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]

  - apiGroups: [""]
    resources: [nodes]
    verbs: [patch, update]

  - apiGroups: [apps]
    resources:
      - deployments
      - deployments/scale
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch, patch, update]

  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]

  - apiGroups: [autopilot.k8s.io]
    resources: [autopilotpolicies, remediationaudits]
    verbs: [get, list, watch, create, update, patch, delete]

  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings, kopfpeerings]
    verbs: [get, list, watch, create, update, patch, delete]

  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch, update]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-autopilot
subjects:
  - kind: ServiceAccount
    name: k8s-autopilot
    namespace: k8s-autopilot

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autopilot-config
  namespace: k8s-autopilot
data:
  config.yaml: |
    mode: suggest
    targetNamespaces: []
    ignoredNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
    logLines: 200
    rateLimit:
      globalMaxPerHour: 20
      perResourceMaxPerHour: 3
      cooldownSeconds: 300
    defaultRules:
      - trigger: CrashLoopBackOff
        autoRemediate: false
        requireApproval: true
        maxPerHour: 3
        minRestartCount: 3
      - trigger: OOMKilled
        autoRemediate: false
        requireApproval: true
        maxPerHour: 2
      - trigger: ImagePullError
        autoRemediate: false
        requireApproval: false
        maxPerHour: 5
      - trigger: NodeNotReady
        autoRemediate: false
        requireApproval: true
        notifyPagerDuty: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autopilot-audit-pvc
  namespace: k8s-autopilot
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-autopilot
  namespace: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-autopilot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-autopilot
        app.kubernetes.io/component: operator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: k8s-autopilot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      terminationGracePeriodSeconds: 60

      containers:
        - name: operator
          image: ghcr.io/YOUR_ORG/k8s-autopilot:latest
          imagePullPolicy: Always
          command: [python, -m, autopilot.main]
          ports:
            - name: metrics
              containerPort: 8000
              protocol: TCP
            - name: webhook
              containerPort: 8080
              protocol: TCP
          env:
            - name: AUTOPILOT_MODE
              value: "suggest"
            - name: LOG_LEVEL
              value: "INFO"
            - name: CONFIG_FILE
              value: "/etc/autopilot/config.yaml"
            - name: AUDIT_DB_PATH
              value: "/data/autopilot-audit.db"

            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autopilot-secrets
                  key: anthropic-api-key
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autopilot-secrets
                  key: slack-bot-token
                  optional: true
            - name: PD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autopilot-secrets
                  key: pd-api-key
                  optional: true

          volumeMounts:
            - name: config
              mountPath: /etc/autopilot
              readOnly: true
            - name: audit-data
              mountPath: /data

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: webhook
            initialDelaySeconds: 10
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

      volumes:
        - name: config
          configMap:
            name: autopilot-config
        - name: audit-data
          persistentVolumeClaim:
            claimName: autopilot-audit-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-autopilot
  namespace: k8s-autopilot
  labels:
    app.kubernetes.io/name: k8s-autopilot
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  selector:
    app.kubernetes.io/name: k8s-autopilot
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
    - name: webhook
      port: 8080
      targetPort: 8080
